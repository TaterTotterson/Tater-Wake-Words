name: Train Wake Word Request

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

concurrency:
  group: tater-wake-word-training
  cancel-in-progress: false

jobs:
  train:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: [self-hosted, macOS, ARM64, tater-wake-words]
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      TATER_WAKE_EXTERNAL_ROOT: ${{ vars.TATER_WAKE_EXTERNAL_ROOT }}
      TATER_WAKE_TRAINER_DIR: ${{ vars.TATER_WAKE_TRAINER_DIR }}
      TATER_WAKE_TMP_ROOT: ${{ vars.TATER_WAKE_TMP_ROOT }}
    steps:
      - name: Prepare external trainer storage
        run: |
          external_root="${TATER_WAKE_EXTERNAL_ROOT:-/Volumes/Untitled}"
          tmp_root="${TATER_WAKE_TMP_ROOT:-${external_root}/tater-wake-tmp}"
          if [[ ! -d "$external_root" ]]; then
            echo "External wake-word volume is not mounted: $external_root"
            exit 1
          fi
          mkdir -p \
            "$tmp_root/tmp" \
            "$tmp_root/outputs" \
            "$tmp_root/repos" \
            "$tmp_root/cache/pip" \
            "$tmp_root/cache/xdg" \
            "$tmp_root/cache/huggingface" \
            "$tmp_root/cache/torch" \
            "$tmp_root/cache/nltk" \
            "$tmp_root/cache/matplotlib"

      - name: Checkout catalog
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Train requested wake word
        run: scripts/train_issue_wake_word.sh
